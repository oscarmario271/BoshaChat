<!DOCTYPE html>
<html>
<head>
  <title>BoshaBot 🤖</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com",
      "ai-logic": "https://www.gstatic.com/firebasejs/12.2.1/firebase-ai.js"
    }
  }
</script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #1a1a1a;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #333;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 15px;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .user {
      align-self: flex-end;
      background: #2563eb;
    }

    .bot {
      align-self: flex-start;
      background: #2a2a2a;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #1a1a1a;
      border-top: 1px solid #333;
    }

    #msg {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #2a2a2a;
      color: white;
    }

    button {
      margin-left: 10px;
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>

<header>🤖 BoshaBot</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="msg" placeholder="Ask BoshaBot..." onkeydown="if(event.key==='Enter') send()">
  <button onclick="send()">Send</button>
</div>

<script>
import { getAI, getGenerativeModel, GoogleAIBackend } from "ai-logic";

// your firebase config (copy EXACTLY from your main file)
const firebaseConfig = {
  apiKey: "AIzaSyBqLckLS5qxKZ06S0fsbQS_mWPVFi4E00w",
  authDomain: "boshachat-acbbc.firebaseapp.com",
  projectId: "boshachat-acbbc",
  storageBucket: "boshachat-acbbc.firebasestorage.app",
  messagingSenderId: "732701616574",
  appId: "1:732701616574:web:abeb808acd5d5bbb3a71ef"
};

firebase.initializeApp(firebaseConfig);

// Initialize the Gemini Developer API backend service
const ai = getAI(firebaseApp, { backend: new GoogleAIBackend() });

// Create a `GenerativeModel` instance with a model that supports your use case
const model = getGenerativeModel(ai, { model: "gemini-2.5-flash-lite" });

const chat = document.getElementById("chat");

firebase.auth().onAuthStateChanged((user) => {
  if (user) {
    console.log("Logged in as:", user.displayName || user.email);
    
    // You can store it globally
    window.currentUser = user;

  } else {
    // Not logged in → send back to main page
    window.location.href = "/BoshaChat/";
  }
});

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;

  if (type === "user") {
    const name = window.currentUser?.displayName || "You";
    div.textContent = name + ": " + text;
  } else {
    div.textContent = "BoshaBot: " + text;
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function getAIResponse(message) {
  const prompt = message;
  const result = await model.generateContent(prompt);
  const response = result.response;
  const text = response.text();
  return text;
}
  
async function send() {
  const input = document.getElementById("msg");
  const text = input.value.trim();

  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const typing = document.createElement("div");
  typing.className = "msg bot";
  typing.textContent = "BoshaBot is typing...";
  chat.appendChild(typing);
  chat.scrollTop = chat.scrollHeight;

  try {
    const reply = await getAIResponse(text);
    typing.remove();
    addMessage(reply.replace(text, "").trim(), "bot");
  } catch (err) {
    typing.remove();
    addMessage("Error getting response 😬", "bot");
  }
}
</script>

</body>
</html>
