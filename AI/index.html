<!DOCTYPE html>
<html>
<head>
  <title>BoshaBot 🤖</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #1a1a1a;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #333;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 15px;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .user {
      align-self: flex-end;
      background: #2563eb;
    }

    .bot {
      align-self: flex-start;
      background: #2a2a2a;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #1a1a1a;
      border-top: 1px solid #333;
    }

    #msg {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #2a2a2a;
      color: white;
    }

    button {
      margin-left: 10px;
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>

<header>🤖 BoshaBot</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="msg" placeholder="Ask BoshaBot..." onkeydown="if(event.key==='Enter') send()">
  <button onclick="send()">Send</button>
</div>

<script>

// your firebase config (copy EXACTLY from your main file)
const firebaseConfig = {
  apiKey: "AIzaSyBqLckLS5qxKZ06S0fsbQS_mWPVFi4E00w",
  authDomain: "boshachat-acbbc.firebaseapp.com",
  projectId: "boshachat-acbbc",
  storageBucket: "boshachat-acbbc.firebasestorage.app",
  messagingSenderId: "732701616574",
  appId: "1:732701616574:web:abeb808acd5d5bbb3a71ef"
};

firebase.initializeApp(firebaseConfig);

const chat = document.getElementById("chat");

firebase.auth().onAuthStateChanged((user) => {
  if (user) {
    console.log("Logged in as:", user.displayName || user.email);
    
    // You can store it globally
    window.currentUser = user;

  } else {
    // Not logged in → send back to main page
    window.location.href = "/BoshaChat/";
  }
});

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;

  if (type === "user") {
    const name = window.currentUser?.displayName || "You";
    div.textContent = name + ": " + text;
  } else {
    div.textContent = "BoshaBot: " + text;
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function getAIResponse(message) {
  try {
    const response = await fetch(
      "https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2",
      {
        method: "POST",
        headers: {
          "Authorization": "Bearer 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",
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          inputs: "Answer this clearly for a student: " + message
        })
      }
    );

    // Sometimes HF returns an error object, so we check first
    const data = await response.json();

    if (data.error) return "Error from Hugging Face: " + data.error;

    // Handle both array or object response
    if (Array.isArray(data) && data[0]?.generated_text) return data[0].generated_text;
    if (data.generated_text) return data.generated_text;

    return "Sorry, I couldn't think of a response 😅";

  } catch (err) {
    console.error(err);
    return "Error connecting to Hugging Face 😬";
  }
}
  
async function send() {
  const input = document.getElementById("msg");
  const text = input.value.trim();

  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const typing = document.createElement("div");
  typing.className = "msg bot";
  typing.textContent = "BoshaBot is typing...";
  chat.appendChild(typing);
  chat.scrollTop = chat.scrollHeight;

  try {
    const reply = await getAIResponse(text);
    typing.remove();
    addMessage(reply.replace(text, "").trim(), "bot");
  } catch (err) {
    typing.remove();
    addMessage("Error getting response 😬", "bot");
  }
}
</script>

</body>
</html>
