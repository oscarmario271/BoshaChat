<!DOCTYPE html>
<html>
<head>
  <title>BoshaChat</title>
  <link href="https://fonts.googleapis.com/css?family=Fredoka+One" rel="stylesheet">
  <style>
    body {
      font-family: Arial;
      margin: 0;
      display: flex;
      height: 100vh;
      background: #f4f4f4;
    }

    #sidebar {
	  font-family: 'Fredoka One', sans-serif;
      width: 260px;
      background: #FF9500;
      color: #00A6FF;
      padding: 15px;
    }

    #sidebar h1 {
	  font-family: 'Fredoka One', sans-serif;
      margin-top: 0;
      font-size: 28px;
      color: #00A6FF;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #messages {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #00A6FF;
    }

    #inputArea input {
      flex: 1;
      padding: 8px;
    }

    button {
      background: white;
      border: none;
      padding: 8px 12px;
      margin: 5px 0;
      cursor: pointer;
    }

    #loginBox {
      margin: auto;
      text-align: center;
    }
  </style>
</head>
<body>

<div id="loginBox">
  <h2>Login</h2>
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
  <p id="loginError" style="color:red;"></p>
</div>

<div id="app" style="display:none; width:100%;">

  <div id="sidebar">
    <h1>BoshaChat</h1>

    <button onclick="loadChat('global')">🌍 Global Chat</button>

    <hr>

    <button onclick="createDM()">➕ New DM</button>
    <div id="dmList"></div>

    <hr id="invites">

    <button onclick="createGroup()">👥 New Group</button>
    <div id="groupList"></div>

    <hr>
	
	<button onclick="openSettings()">⚙ Settings</button><br>
    <button onclick="loadChat('onlinePanel')">🟢 Online Users</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div id="main">
    <div id="messages"></div>
	<div id="typingIndicator" style="padding:5px;color:gray;"></div>

    <div id="inputArea">
      <input id="messageInput" placeholder="Type message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth, signInWithEmailAndPassword, 
  onAuthStateChanged, signOut 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { 
  getFirestore, collection, addDoc, onSnapshot, 
  query, orderBy, doc, setDoc, getDocs, 
  updateDoc, deleteDoc, getDoc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBqLckLS5qxKZ06S0fsbQS_mWPVFi4E00w",
  authDomain: "boshachat-acbbc.firebaseapp.com",
  projectId: "boshachat-acbbc",
  storageBucket: "boshachat-acbbc.firebasestorage.app",
  messagingSenderId: "732701616574",
  appId: "1:732701616574:web:abeb808acd5d5bbb3a71ef"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentChatId = "global";
let unsubscribeMessages;
let unsubscribeTyping;
let currentDisplayName = "";
let userCache = {};

const loginBox = document.getElementById("loginBox");
const appDiv = document.getElementById("app");
const messagesDiv = document.getElementById("messages");
const messageInput = document.getElementById("messageInput");
const hr = document.getElementById("invites");
const groupList = document.getElementById("groupList");
const dmList = document.getElementById("dmList");

const inviteSection = document.createElement("div");
inviteSection.innerHTML = "<hr><h3>📨 Invites</h3>";
document.getElementById("sidebar").insertBefore(inviteSection, hr);

/* ---------------- DISPLAY NAME SYSTEM ---------------- */

async function ensureUserProfile(user) {
  const ref = doc(db, "users", user.email);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    currentDisplayName = user.email.split("@")[0];

    await setDoc(ref, {
      displayName: currentDisplayName,
      online: true
    });
  } else {
    currentDisplayName = snap.data().displayName;
    await updateDoc(ref, { online: true });
  }
}

async function getDisplayName(email) {
  const snap = await getDoc(doc(db, "users", email));
  return snap.exists() ? snap.data().displayName : email;
}

function watchUsers() {
  onSnapshot(collection(db, "users"), snapshot => {
    snapshot.forEach(docSnap => {
      userCache[docSnap.id] = docSnap.data().displayName;
    });
  });
}

/* ---------------- AUTH ---------------- */

window.login = function() {
  signInWithEmailAndPassword(
    auth,
    email.value,
    password.value
  ).catch(err => loginError.innerText = err.message);
}

window.logout = async function() {
  await updateDoc(doc(db, "users", auth.currentUser.email), {
    online: false
  });
  signOut(auth);
}

onAuthStateChanged(auth, async user => {
  if (user) {
    loginBox.style.display = "none";
    appDiv.style.display = "flex";

    await ensureGlobalExists();
    await ensureUserProfile(user);
	
	watchUsers();
    loadChat("global");
    loadChats();
    loadInvites();
    watchOnlineUsers();
  } else {
    loginBox.style.display = "block";
    appDiv.style.display = "none";
  }
});

/* ---------------- GLOBAL ---------------- */

async function ensureGlobalExists() {
  await setDoc(doc(db, "chats", "global"), 
    { type: "global" }, 
    { merge: true }
  );
}

/* ---------------- LOAD CHAT ---------------- */

window.loadChat = function(chatId) {
  currentChatId = chatId;
  messagesDiv.innerHTML = "";

  if (unsubscribeMessages) unsubscribeMessages();
  if (unsubscribeTyping) unsubscribeTyping();

  if (chatId === "onlinePanel") {
    loadOnlinePanel();
    return;
  }

  const q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("timestamp")
  );

  unsubscribeMessages = onSnapshot(q, snapshot => {
  messagesDiv.innerHTML = "";

  snapshot.forEach(docSnap => {
    const data = docSnap.data();

    const name =
      userCache[data.user] ||
      data.user.split("@")[0];

    messagesDiv.innerHTML +=
      `<div><b>${name}</b>: ${data.text}</div>`;
  });

  messagesDiv.scrollTop = messagesDiv.scrollHeight;
});

  watchTyping(chatId);
};

/* ---------------- LOAD CHATS ------------------ */

async function loadChats() {
  const snapshot = await getDocs(collection(db, "chats"));
  dmList.innerHTML = "";
  groupList.innerHTML = "";

  snapshot.forEach(docSnap => {
    const data = docSnap.data();

    if (!data.members || !data.members.includes(auth.currentUser.email)) return;

    if (data.type === "dm") {
      const btn = document.createElement("button");
      btn.innerText = "DM Chat";
      btn.onclick = () => loadChat(docSnap.id);
      dmList.appendChild(btn);
    }

    if (data.type === "group") {
      const btn = document.createElement("button");
      btn.innerText = "👥 " + data.name;
      btn.onclick = () => loadChat(docSnap.id);
      groupList.appendChild(btn);
    }
  });
}

/* ---------------- SEND MESSAGE ---------------- */

window.sendMessage = async function() {
  if (!messageInput.value) return;

  await addDoc(collection(db, "chats", currentChatId, "messages"), {
    user: auth.currentUser.email,
    text: messageInput.value,
    timestamp: Date.now()
  });

  messageInput.value = "";
  stopTyping();
}

/* ---------------- TYPING SYSTEM ---------------- */

let typingTimeout;

messageInput.addEventListener("input", async () => {
  if (!auth.currentUser) return;

  await setDoc(
    doc(db, "chats", currentChatId, "typing", auth.currentUser.email),
    { timestamp: Date.now() }
  );

  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(stopTyping, 2000);
});

async function stopTyping() {
  try {
    await deleteDoc(
      doc(db, "chats", currentChatId, "typing", auth.currentUser.email)
    );
  } catch {}
}

function watchTyping(chatId) {
  const typingDiv = document.getElementById("typingIndicator");

  unsubscribeTyping = onSnapshot(
    collection(db, "chats", chatId, "typing"),
    snapshot => {

      let typingUsers = [];

      snapshot.forEach(docSnap => {
        if (docSnap.id !== auth.currentUser.email) {
          const name =
            userCache[docSnap.id] ||
            docSnap.id.split("@")[0];

          typingUsers.push(name);
        }
      });

      if (typingUsers.length > 0) {
        typingDiv.innerHTML =
          `<i>${typingUsers.join(", ")} is typing...</i>`;
      } else {
        typingDiv.innerHTML = "";
      }
    }
  );
}

/* ---------------- ONLINE USERS ---------------- */

function watchOnlineUsers() {
  onSnapshot(collection(db, "users"), snapshot => {});
}

function loadOnlinePanel() {
  messagesDiv.innerHTML = "<h3>🟢 Online Users</h3>";

  onSnapshot(collection(db, "users"), snapshot => {
    messagesDiv.innerHTML = "<h3>🟢 Online Users</h3>";

    snapshot.forEach(docSnap => {
      if (docSnap.data().online) {
        messagesDiv.innerHTML += 
          `<div>${docSnap.data().displayName}</div>`;
      }
    });
  });
}

/* ---------------- SETTINGS PANEL ---------------- */

window.openSettings = function() {
  currentChatId = "settingsPanel";
  messagesDiv.innerHTML = `
    <h3>⚙ Settings</h3>
    <button onclick="changeDisplayName()">Change Display Name</button>
  `;
}

window.changeDisplayName = async function() {
  const newName = prompt("Enter new display name:");
  if (!newName) return;

  await updateDoc(
    doc(db, "users", auth.currentUser.email),
    { displayName: newName }
  );

  alert("Updated!");
}

/* ---------------- INVITES / GROUPS / DMS ---------------- */
/* YOUR ORIGINAL LOGIC BELOW UNCHANGED */

window.createDM = async function() {
  const email = prompt("Enter email for DM:");
  if (!email) return;

  const chatRef = await addDoc(collection(db, "chats"), {
    type: "dm",
    members: [auth.currentUser.email]
  });

  await addDoc(collection(db, "invites"), {
    chatId: chatRef.id,
    from: auth.currentUser.email,
    to: email,
    type: "dm",
    status: "pending"
  });
};

window.createGroup = async function() {
  const name = prompt("Group name:");
  if (!name) return;

  const membersInput = prompt("Enter member emails separated by commas:");
  if (!membersInput) return;

  const chatRef = await addDoc(collection(db, "chats"), {
    type: "group",
    name,
    members: [auth.currentUser.email]
  });

  const members = membersInput.split(",").map(e => e.trim());

  for (const member of members) {
    await addDoc(collection(db, "invites"), {
      chatId: chatRef.id,
      from: auth.currentUser.email,
      to: member,
      type: "group",
      groupName: name,
      status: "pending"
    });
  }
};
window.addEventListener("beforeunload", async () => {
  if (auth.currentUser) {
    try {
      await updateDoc(doc(db, "users", auth.currentUser.email), {
        online: false
      });
    } catch {}
  }
});

</script>

</body>
</html>
